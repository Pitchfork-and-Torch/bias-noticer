<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Bias Noticer v2.0 — Put on the shades</title>
  <desc id="desc">Infographic: multi-pass analysis, Signal Radar, Technique Academy, research briefs. Techniques over tribes. Privacy-first.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070c"/>
      <stop offset="55%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>
  <rect width="1400" height="980" fill="url(#scan)"/>
  <g stroke="#1e293b" stroke-width="1" opacity="0.45">
    <path d="M0 180 H1400 M0 360 H1400 M0 540 H1400 M0 720 H1400 M0 900 H1400"/>
    <path d="M200 0 V980 M400 0 V980 M600 0 V980 M800 0 V980 M1000 0 V980 M1200 0 V980"/>
  </g>

  <rect x="0" y="0" width="1400" height="4" fill="url(#neon)"/>

  <!-- header -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <text x="70" y="72" fill="#94a3b8" font-size="16" letter-spacing="5">CRITICAL READING LAYER · v2.0</text>
    <text x="70" y="124" fill="#f8fafc" font-size="52" font-weight="800">BIAS NOTICER</text>
    <text x="70" y="168" fill="url(#neon)" font-size="26" font-weight="700" filter="url(#glow)">Exceptional sunglasses for the news.</text>
    <text x="70" y="206" fill="#94a3b8" font-size="17">Multi-pass technique detection · Academy mastery · research briefs — never a left/right meter.</text>
  </g>

  <!-- sunglasses -->
  <g transform="translate(1120,62)" filter="url(#glow)">
    <ellipse cx="40" cy="40" rx="42" ry="28" fill="none" stroke="#22d3ee" stroke-width="5"/>
    <ellipse cx="140" cy="40" rx="42" ry="28" fill="none" stroke="#e879f9" stroke-width="5"/>
    <path d="M82 40 H98" stroke="#a3e635" stroke-width="5" stroke-linecap="round"/>
    <path d="M-10 30 Q0 10 20 18" stroke="#22d3ee" stroke-width="4" fill="none"/>
    <path d="M190 30 Q200 10 180 18" stroke="#e879f9" stroke-width="4" fill="none"/>
  </g>

  <!-- multi-pass strip -->
  <rect x="60" y="240" width="1280" height="72" rx="16" fill="#020617" stroke="#334155" stroke-width="1"/>
  <text x="90" y="272" fill="#22d3ee" font-size="13" font-weight="700" font-family="Segoe UI, sans-serif" letter-spacing="2">MULTI-PASS ENGINE</text>
  <text x="90" y="298" fill="#cbd5e1" font-size="15" font-family="Segoe UI, sans-serif">0 Structure  →  1 Detect  →  2 Verify (voice &amp; spans)  →  3 Context (optional thorough)  ·  prefer under-flagging</text>

  <!-- step cards row -->
  <g>
    <rect x="60" y="340" width="300" height="250" rx="20" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="100" cy="388" r="20" fill="#083344" stroke="#22d3ee" stroke-width="2"/>
    <text x="100" y="395" text-anchor="middle" fill="#22d3ee" font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">1</text>
    <text x="136" y="398" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Segoe UI, sans-serif">EXTRACT</text>
    <text x="88" y="445" fill="#94a3b8" font-size="15" font-family="Segoe UI, sans-serif">
      <tspan x="88" dy="0">DOM / reader text only.</tspan>
      <tspan x="88" dy="26">Structure pass: quotes,</tspan>
      <tspan x="88" dy="26">sources, genre guess.</tspan>
      <tspan x="88" dy="26">No paywall bypass.</tspan>
    </text>
  </g>

  <g>
    <rect x="390" y="340" width="300" height="250" rx="20" fill="url(#card)" stroke="#a3e635" stroke-width="2"/>
    <circle cx="430" cy="388" r="20" fill="#14532d" stroke="#a3e635" stroke-width="2"/>
    <text x="430" y="395" text-anchor="middle" fill="#a3e635" font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">2</text>
    <text x="466" y="398" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Segoe UI, sans-serif">ANALYZE</text>
    <text x="418" y="445" fill="#94a3b8" font-size="15" font-family="Segoe UI, sans-serif">
      <tspan x="418" dy="0">BYOK Grok multi-pass.</tspan>
      <tspan x="418" dy="26">Verify author vs quote.</tspan>
      <tspan x="418" dy="26">Local heuristics fallback.</tspan>
      <tspan x="418" dy="26">Techniques, not tribes.</tspan>
    </text>
  </g>

  <g>
    <rect x="720" y="340" width="300" height="250" rx="20" fill="url(#card)" stroke="#e879f9" stroke-width="2"/>
    <circle cx="760" cy="388" r="20" fill="#4a044e" stroke="#e879f9" stroke-width="2"/>
    <text x="760" y="395" text-anchor="middle" fill="#e879f9" font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">3</text>
    <text x="796" y="398" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Segoe UI, sans-serif">SEE</text>
    <text x="748" y="445" fill="#94a3b8" font-size="15" font-family="Segoe UI, sans-serif">
      <tspan x="748" dy="0">Signal Radar 2.0 layers.</tspan>
      <tspan x="748" dy="26">Non-destructive marks.</tspan>
      <tspan x="748" dy="26">Academy mastery drills.</tspan>
      <tspan x="748" dy="26">Research brief export.</tspan>
    </text>
  </g>

  <g>
    <rect x="1050" y="340" width="290" height="250" rx="20" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="1090" cy="388" r="20" fill="#083344" stroke="#22d3ee" stroke-width="2"/>
    <text x="1090" y="395" text-anchor="middle" fill="#22d3ee" font-size="18" font-weight="800" font-family="Segoe UI, sans-serif">4</text>
    <text x="1126" y="398" fill="#e2e8f0" font-size="20" font-weight="700" font-family="Segoe UI, sans-serif">JUDGE</text>
    <text x="1078" y="445" fill="#94a3b8" font-size="15" font-family="Segoe UI, sans-serif">
      <tspan x="1078" dy="0">Grades A+–F local only.</tspan>
      <tspan x="1078" dy="26">Calibrated neutrality.</tspan>
      <tspan x="1078" dy="26">You stay in charge.</tspan>
      <tspan x="1078" dy="26">AI never replaces you.</tspan>
    </text>
  </g>

  <!-- principles row -->
  <g font-family="Segoe UI, sans-serif">
    <rect x="60" y="620" width="300" height="88" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <text x="80" y="655" fill="#22d3ee" font-size="13" font-weight="700">TECHNIQUES</text>
    <text x="80" y="682" fill="#94a3b8" font-size="14">Not left/right scores</text>

    <rect x="380" y="620" width="300" height="88" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <text x="400" y="655" fill="#a3e635" font-size="13" font-weight="700">PRIVACY-FIRST</text>
    <text x="400" y="682" fill="#94a3b8" font-size="14">Local storage · BYOK only</text>

    <rect x="700" y="620" width="300" height="88" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <text x="720" y="655" fill="#e879f9" font-size="13" font-weight="700">UNDER-FLAG</text>
    <text x="720" y="682" fill="#94a3b8" font-size="14">Precision over noise</text>

    <rect x="1020" y="620" width="320" height="88" rx="14" fill="#0f172a" stroke="#1e293b"/>
    <text x="1040" y="655" fill="#38bdf8" font-size="13" font-weight="700">NO PAYWALL BYPASS</text>
    <text x="1040" y="682" fill="#94a3b8" font-size="14">DOM or lawful paste only</text>
  </g>

  <!-- install -->
  <rect x="60" y="740" width="1280" height="180" rx="22" fill="#020617" stroke="#334155" stroke-width="1"/>
  <text x="100" y="790" fill="#f8fafc" font-size="22" font-weight="700" font-family="Segoe UI, sans-serif">Install · free &amp; open source · v2.0</text>
  <text x="100" y="832" fill="#94a3b8" font-size="16" font-family="Segoe UI, sans-serif">
    <tspan x="100" dy="0">1. Download bias-noticer-chrome-mv3.zip (or Firefox zip) from GitHub Releases</tspan>
    <tspan x="100" dy="26">2. Unzip → chrome://extensions (or about:debugging) → Developer mode → Load unpacked</tspan>
    <tspan x="100" dy="26">3. Pin the puzzle icon · Ctrl+Shift+B · optional xAI key in Settings</tspan>
  </text>
  <text x="100" y="900" fill="#64748b" font-size="13" font-family="Segoe UI, sans-serif">MIT · Pitchfork-and-Torch · Not affiliated with They Live / Universal · github.com/Pitchfork-and-Torch/bias-noticer</text>

  <rect x="0" y="976" width="1400" height="4" fill="url(#neon)"/>
</svg>
