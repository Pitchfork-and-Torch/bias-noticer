<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>01 Install</title>
<style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:40px}
.card{max-width:900px;margin:0 auto;background:#111827;border:1px solid #334155;border-radius:16px;padding:24px}
h1{font-size:18px;margin:0 0 8px}
.sub{color:#94a3b8;font-size:13px;margin-bottom:20px}
.row{display:flex;gap:16px;align-items:center;padding:16px;border:1px solid #1e293b;border-radius:12px;background:#0b1220}
.icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#0369a1)}
.badge{background:#166534;color:#bbf7d0;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.btn{margin-left:auto;background:#0ea5e9;border:0;color:#fff;font-weight:600;padding:8px 14px;border-radius:10px}
.cap{margin-top:16px;font-size:12px;color:#64748b}
</style></head><body>
<div class="card">
  <h1>chrome://extensions</h1>
  <p class="sub">Developer mode · Load unpacked → <code>.output/chrome-mv3</code></p>
  <div class="row">
    <div class="icon"></div>
    <div>
      <div style="font-weight:700">Bias Noticer</div>
      <div style="font-size:12px;color:#94a3b8">See through the propaganda. · v1.2.0</div>
    </div>
    <span class="badge">Enabled</span>
    <button class="btn">Details</button>
  </div>
  <p class="cap">ID placeholder · Storage · activeTab · sidePanel · api.x.ai</p>
</div>
</body></html>
