<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>10 They Live theme</title>
<style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:#070b12;color:#ecfeff;min-height:100vh;
background-image:repeating-linear-gradient(0deg,rgba(0,240,255,.04),rgba(0,240,255,.04) 1px,transparent 2px,transparent 4px)}
.wrap{max-width:960px;margin:0 auto;padding:40px 24px;display:grid;grid-template-columns:1fr 320px;gap:20px}
.art{background:rgba(15,23,42,.75);border:1px solid rgba(0,240,255,.2);border-radius:16px;padding:28px;box-shadow:0 0 40px rgba(0,240,255,.08)}
h1{font-size:1.5rem;text-shadow:0 0 12px rgba(0,240,255,.25)}
mark{text-decoration:underline wavy #00f0ff;text-underline-offset:3px;background:rgba(0,240,255,.08);text-shadow:0 0 6px rgba(0,240,255,.35)}
.panel{background:rgba(8,15,30,.9);border:1px solid rgba(0,240,255,.25);border-radius:16px;padding:16px}
.gauge{width:80px;height:80px;border-radius:50%;border:4px solid #00f0ff;display:grid;place-items:center;font-weight:800;font-size:22px;box-shadow:0 0 20px rgba(0,240,255,.35);margin-bottom:12px}
.meta{font-size:11px;color:#67e8f9;letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="wrap">
  <div class="art">
    <div class="meta">They Live Retro · optional</div>
    <h1>See through the propaganda.</h1>
    <p style="line-height:1.7;font-size:17px;font-family:Georgia,serif">The coverage <mark>slammed</mark> the filing as unprecedented while casting routine editorial choices as carefully sourced — a framing worth reading twice.</p>
  </div>
  <div class="panel">
    <div class="gauge">58</div>
    <div class="meta">Neutrality</div>
    <p style="font-size:13px;line-height:1.5;margin-top:10px;color:#a5f3fc">Technique flags with neon accent — still serious, never cartoon.</p>
  </div>
</div>
</body></html>
