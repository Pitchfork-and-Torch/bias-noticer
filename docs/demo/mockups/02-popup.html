<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>02 Popup</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#334155;font-family:Inter,system-ui,sans-serif}
.pop{width:360px;background:#f8fafc;color:#0f172a;border-radius:16px;padding:16px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.brand{display:flex;gap:10px;align-items:center}
h1{margin:0;font-size:16px}.tag{font-size:11px;color:#64748b}
.btn{width:100%;margin-top:12px;border:0;border-radius:12px;padding:10px;font-weight:700;cursor:pointer}
.p{background:#0284c7;color:#fff}.s{background:#e2e8f0;color:#0f172a;margin-top:8px}
.row{display:flex;gap:8px}.row .s{flex:1}
.disc{font-size:10px;color:#64748b;margin-top:12px;line-height:1.4}
</style></head><body>
<div class="pop">
  <div class="brand">
    <svg width="36" height="36" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0b1220"/><rect x="8" y="26" width="18" height="14" rx="4" fill="#0ea5e9"/><rect x="38" y="26" width="18" height="14" rx="4" fill="#0ea5e9"/></svg>
    <div><h1>Bias Noticer</h1><div class="tag">See through the propaganda.</div></div>
  </div>
  <p style="font-size:12px;color:#64748b;margin:12px 0 0">nytimes.com · Business / Media</p>
  <button class="btn p">Put on shades</button>
  <div class="row"><button class="btn s">Force</button><button class="btn s">Reader</button><button class="btn s">Demo</button></div>
  <p class="disc">AI-assisted analysis. Not infallible. Augments critical thinking — does not replace it.</p>
</div>
</body></html>
